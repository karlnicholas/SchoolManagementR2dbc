spring.application.name=SchoolManagementR2dbc
spring.data.r2dbc.repositories.enabled=true
spring.r2dbc.url=r2dbc:mssql://localhost:1433/reactnonreact?trustServerCertificate=true
spring.r2dbc.password=reactnonreact
spring.r2dbc.username=reactnonreact
spring.r2dbc.pool.initial-size=1
spring.r2dbc.pool.max-size=1
#
logging.level.org.springframework.data.r2dbc.dialect.DialectResolver=TRACE
logging.level.org.springframework.data.r2dbc=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
logging.level.org.springframework.r2dbc.core.DefaultDatabaseClient=DEBUG
logging.level.io.r2dbc.mssql=TRACE
